services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bigbanana-web
    ports:
      - "3005:80"
    depends_on:
      - media-proxy
      - new-api-proxy
    restart: unless-stopped

  media-proxy:
    build:
      context: .
      dockerfile: Dockerfile.media-proxy
    container_name: bigbanana-media-proxy
    environment:
      MEDIA_PROXY_PORT: "8787"
      MEDIA_PROXY_ALLOWED_HOSTS: "volces.com"
      MEDIA_PROXY_ALLOWED_PROTOCOLS: "https"
      MEDIA_PROXY_TIMEOUT_MS: "120000"
      MEDIA_PROXY_MAX_URL_LENGTH: "4096"
      MEDIA_PROXY_CORS_ORIGIN: "*"
    expose:
      - "8787"
    restart: unless-stopped

  new-api-proxy:
    build:
      context: .
      dockerfile: Dockerfile.new-api-proxy
    container_name: bigbanana-new-api-proxy
    environment:
      NEW_API_PROXY_PORT: "8788"
      NEW_API_ALLOWED_HOSTS: ""
      NEW_API_ALLOW_PRIVATE_HOSTS: "false"
    expose:
      - "8788"
    restart: unless-stopped
